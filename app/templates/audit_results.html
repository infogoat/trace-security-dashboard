{% extends "base.html" %}

{% block content %}
<div class="p-8">

    <h2 class="text-2xl font-bold mb-6">Audit Results</h2>

    <div class="bg-white shadow rounded p-6">
        <table class="w-full border border-slate-200">
            <thead class="bg-slate-100">
                <tr>
                    <th class="p-3 text-left">System</th>
                    <th class="p-3 text-left">Last Scan</th>
                    <th class="p-3 text-left">Score</th>
                </tr>
            </thead>
            <tbody id="auditTable"></tbody>
        </table>
    </div>

</div>

<script>
async function loadAuditResults() {
    const token = localStorage.getItem("token");

    const systems = await fetch("/systems/", {
        headers: { "Authorization": "Bearer " + token }
    }).then(res => res.json());

    const table = document.getElementById("auditTable");
    table.innerHTML = "";

    for (let system of systems) {
        const runs = await fetch(`/audit/runs/${system.id}`, {
            headers: { "Authorization": "Bearer " + token }
        }).then(res => res.json());

        const lastRun = runs.length > 0 ? runs[0] : null;

        table.innerHTML += `
            <tr class="border-t hover:bg-slate-50">
                <td class="p-3">${system.hostname}</td>
                <td class="p-3">${lastRun ? lastRun.started_at : "No scans"}</td>
                <td class="p-3">${system.security_score}%</td>
            </tr>
        `;
    }
}

loadAuditResults();
</script>

{% endblock %}
