{% extends "base.html" %}

{% block content %}
<div class="p-8">

<h2 class="text-2xl font-bold mb-6">Remediation Requests</h2>

<div class="bg-white shadow rounded p-6">
<table class="w-full border border-slate-200">
<thead class="bg-slate-100">
<tr>
<th class="p-3 text-left">Rule</th>
<th class="p-3 text-left">System</th>
<th class="p-3 text-left">Action</th>
</tr>
</thead>
<tbody id="remTable"></tbody>
</table>
</div>

</div>

<script>

function getUserRole() {
    const token = localStorage.getItem("token");
    if (!token) return null;

    const payload = JSON.parse(atob(token.split('.')[1]));
    return payload.role;
}

async function loadRemediation() {

    const token = localStorage.getItem("token");

    if (!token) {
        alert("Not authenticated.");
        window.location.href = "/";
        return;
    }

    const role = getUserRole();

    try {

        const response = await fetch("/remediation/pending", {
            headers: {
                "Authorization": "Bearer " + token
            }
        });

        const pending = await response.json();

        const table = document.getElementById("remTable");
        table.innerHTML = "";

        if (pending.length === 0) {
            table.innerHTML = `
            <tr>
            <td colspan="3" class="p-4 text-center text-slate-500">
            No pending remediation requests
            </td>
            </tr>`;
            return;
        }

        for (let req of pending) {

            let actionButton = "";

            if (role === "admin") {
                actionButton = `
                <button onclick="approveRequest(${req.id})"
                class="bg-green-600 text-white px-3 py-1 rounded hover:bg-green-700">
                Approve
                </button>`;
            } else {
                actionButton = `
                <span class="text-slate-500">
                Awaiting admin approval
                </span>`;
            }

            table.innerHTML += `
            <tr class="border-t">
            <td class="p-3">${req.rule_name}</td>
            <td class="p-3">${req.system_id}</td>
            <td class="p-3">${actionButton}</td>
            </tr>`;
        }

    } catch (error) {
        console.error(error);
        alert("You are not authorized to access this page.");
    }

}

async function approveRequest(requestId) {

    const token = localStorage.getItem("token");

    try {

        const response = await fetch(`/remediation/approve/${requestId}`, {
            method: "POST",
            headers: {
                "Authorization": "Bearer " + token
            }
        });

        const data = await response.json();

        if (!response.ok) {
            throw new Error(data.detail);
        }

        alert(data.message);
        loadRemediation();

    } catch (error) {
        console.error(error);
        alert("Approval failed.");
    }

}

loadRemediation();

</script>

{% endblock %}
