<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>TRACE Security Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body class="bg-slate-50 text-slate-800">

<script>
function getToken() {
    return localStorage.getItem("token");
}

function authHeaders() {
    return {
        "Authorization": "Bearer " + getToken()
    };
}

function logout() {
    localStorage.removeItem("token");
    window.location.href = "/";
}

function protectRoute() {
    if (!getToken()) {
        window.location.href = "/";
    }
}
</script>

<div class="flex h-screen">

<!-- Sidebar -->
    <aside class="w-64 bg-slate-900 text-white flex flex-col">

        <div class="h-16 flex items-center justify-center border-b border-slate-700">
            <h1 class="text-xl font-bold tracking-wide">TRACE</h1>
        </div>

        <nav class="flex-1 p-4 space-y-2">

            <a href="/dashboard"
               class="block px-4 py-2 rounded hover:bg-slate-800 transition">
                Dashboard Overview
            </a>

            <a href="/audit-results"
               class="block px-4 py-2 rounded hover:bg-slate-800 transition">
                Audit Results
            </a>

            <a href="/vulnerabilities"
               class="block px-4 py-2 rounded hover:bg-slate-800 transition">
                Vulnerabilities
            </a>

            <a href="/remediation"
               class="block px-4 py-2 rounded hover:bg-slate-800 transition">
                Remediation Tools
            </a>

            <a href="/compliance-report"
               class="block px-4 py-2 rounded hover:bg-slate-800 transition">
                Compliance Reports
            </a>

        </nav>

        <div class="p-4 border-t border-slate-700">
            <button onclick="logout()"
                    class="w-full bg-red-600 hover:bg-red-700 px-4 py-2 rounded">
                Logout
            </button>
        </div>

    </aside>

    <!-- Main -->
    <div class="flex-1 flex flex-col">

        <!-- Header -->
        <header class="h-16 bg-white border-b border-slate-200 flex items-center justify-between px-6">
            <h2 class="font-semibold text-lg">{% block page_title %}{% endblock %}</h2>

            <button onclick="logout()" class="text-sm text-slate-600 hover:underline">
                Logout
            </button>
        </header>

        <!-- Content -->
        <main class="flex-1 p-6 overflow-y-auto bg-slate-50">
            {% block content %}{% endblock %}
        </main>

    </div>
</div>

</body>
</html>
